{% extends "base.html" %} {% block content %}

<div class="grid md:grid-cols-2 gap-6" x-data="speakerApp()">
  <!-- CREATE -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-lg font-semibold mb-4">Add Speaker</h2>

    <div class="space-y-3">
      <input
        class="w-full border rounded px-3 py-2"
        placeholder="ID"
        x-model="id"
      />
      <input
        class="w-full border rounded px-3 py-2"
        placeholder="Name"
        x-model="name"
      />
      <input
        class="w-full border rounded px-3 py-2"
        placeholder="Topic"
        x-model="topic"
      />
      <input
        class="w-full border rounded px-3 py-2"
        placeholder="Bio"
        x-model="bio"
      />
      <input
        class="w-full border rounded px-3 py-2"
        placeholder="Handle"
        x-model="handle"
      />

      <button
        @click="create()"
        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
      >
        Save
      </button>
    </div>
  </div>

  <!-- LOOKUP -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-lg font-semibold mb-4">Lookup</h2>

    <input
      class="w-full border rounded px-3 py-2 mb-3"
      placeholder="Speaker ID"
      x-model="searchId"
    />

    <button @click="load()" class="bg-gray-800 text-white px-4 py-2 rounded">
      Load
    </button>

    <!-- RESULT -->
    <template x-if="result">
      <div class="mt-6 border rounded-lg p-4 bg-gray-50 space-y-3">
        <div>
          <span class="text-xs text-gray-500">ID</span>
          <div class="font-medium" x-text="result.id"></div>
        </div>

        <div>
          <span class="text-xs text-gray-500">Name</span>
          <div class="font-medium" x-text="result.name"></div>
        </div>

        <div>
          <span class="text-xs text-gray-500">Topic</span>
          <div class="font-medium text-blue-600" x-text="result.topic"></div>
        </div>

        <div>
          <span class="text-xs text-gray-500">Bio</span>
          <div class="text-sm text-gray-700" x-text="result.bio"></div>
        </div>

        <div>
          <span class="text-xs text-gray-500">Handle</span>
          <div class="text-sm text-gray-700" x-text="result.handle"></div>
        </div>
      </div>
    </template>

    <!-- EMPTY STATE -->
    <template x-if="result === null">
      <div class="mt-6 text-sm text-gray-400">No data loaded yet</div>
    </template>
  </div>

  <!-- LOOKUP -->
  <div class="bg-white p-6 rounded-xl shadow col-span-2">
    <h2 class="text-lg font-semibold mb-4">Search by Topic</h2>

    <div class="flex gap-2 mb-4">
      <input
        class="flex-1 border rounded px-3 py-2"
        placeholder="Topic (e.g. AI)"
        x-model="searchTopic"
      />

      <button
        @click="loadTopic()"
        class="bg-gray-800 text-white px-4 py-2 rounded"
      >
        Search
      </button>
    </div>

    <!-- LOADING -->
    <div x-show="loading" class="text-sm text-gray-500 mb-4">Loading...</div>

    <!-- RESULTS GRID -->
    <div
      class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
      x-show="results.length > 0"
    >
      <template x-for="res in results">
        <div class="border rounded-lg p-4 bg-gray-50 hover:shadow transition">
          <div class="flex justify-between items-center mb-2">
            <h3 class="font-semibold text-gray-800" x-text="res.name"></h3>
            <span
              class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded"
              x-text="res.topic"
            ></span>
          </div>

          <p class="text-sm text-gray-600 mb-3" x-text="res.bio"></p>

          <div class="text-xs text-gray-400 flex justify-between">
            <span x-text="res.handle"></span>
          </div>
        </div>
      </template>
    </div>

    <!-- EMPTY STATE -->
    <template x-if="!loading && results.length === 0">
      <div class="mt-4 text-sm text-gray-400">
        No speakers found for this topic
      </div>
    </template>
  </div>
</div>

<script>
  function speakerApp() {
    return {
      id: "",
      name: "",
      topic: "",
      bio: "",
      handle: "",
      searchId: "",
      result: null,
      searchTopic: '',
      results: [],
      loading: false,

      async loadTopic() {
        this.loading = true;
        this.results = [];

        const res = await fetch(`/speakers/topic/${this.searchTopic}`);
        this.results = await res.json();
        this.loading = false;
      },

      async create() {
        await fetch("/speakers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(this),
        });
      },

      loading: false,

      async load() {
        this.loading = true;
        const res = await fetch(`/speakers/${this.searchId}`);
        this.result = await res.json();
        this.loading = false;
      },
    };
  }
</script>

{% endblock %}
